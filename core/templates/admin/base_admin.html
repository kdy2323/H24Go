{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}H24Go Admin{% endblock %}</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="{% static 'img/favi.ico' %}" type="image/x-icon">

    <!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#eecb04">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="H24Go">
<link rel="apple-touch-icon" href="{% static 'img/logo.png' %}">
<meta name="mobile-web-app-capable" content="yes">
 
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('SW enregistré:', reg.scope))
            .catch(err => console.log('SW erreur:', err));
    });
}
</script>
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-light shadow-sm">
    <div class="container-fluid">

        <!-- Toggle mobile -->
        <button class="btn btn-outline-light me-3 d-lg-none"
                data-bs-toggle="offcanvas"
                data-bs-target="#sidebarAdmin">
            <i class="bi bi-list"></i>
        </button>

        <a class="navbar-brand fw-bold" style="color: black;" href="#">
            <img src="{% static 'img/logo.png' %}" width="40" height="40" class="me-2">
        </a>

        <div class="ms-auto">
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Déconnexion
            </a>
        </div>

    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR DESKTOP -->
        <nav class="col-lg-2 d-none d-lg-block bg-white shadow-sm vh-100">
            <div class="pt-4 px-3">

                <h6 class="fw-bold text-dark mb-3">
                    <i class="bi bi-shield-lock"></i> Admin
                </h6>

                <ul class="nav flex-column">

                    <li class="nav-item mb-2">
                        <a class="nav-link text-dark {% if request.resolver_match.url_name == 'admin_dashboard' %}fw-bold text-black{% endif %}"
                           href="{% url 'admin_dashboard' %}">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>

                    <!-- Ajoute ici tes autres menus admin -->
                    <li class="nav-item mb-2">
                        <a class="nav-link text-dark" href="#">
                            <i class="bi bi-people me-2"></i> Utilisateurs
                        </a>
                    </li>

                    <li class="nav-item mb-2">
                        <a class="nav-link text-dark" href="#">
                            <i class="bi bi-car-front me-2"></i> Taxis
                        </a>
                    </li>

                    <li class="nav-item mb-2">
                        <a class="nav-link text-dark" href="#">
                            <i class="bi bi-graph-up me-2"></i> Statistiques
                        </a>
                    </li>

                    <hr>

                    <li class="nav-item mb-2">
                        <a class="nav-link text-dark" href="{% url 'logout' %}">
                            <i class="bi bi-box-arrow-right me-2"></i> Déconnexion
                        </a>
                    </li>

                </ul>

            </div>
        </nav>

        <!-- SIDEBAR MOBILE -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarAdmin">
            <div class="offcanvas-header bg-white">
                <h5 class="offcanvas-title">
                    <i class="bi bi-shield-lock"></i> Admin
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>

            <div class="offcanvas-body">

                <ul class="nav flex-column">

                    <li class="nav-item mb-2">
                        <a class="nav-link" href="{% url 'admin_dashboard' %}">
                            <i class="bi bi-speedometer2 me-2"></i> Dashboard
                        </a>
                    </li>

                    <li class="nav-item mb-2">
                        <a class="nav-link" href="#">
                            <i class="bi bi-people me-2"></i> Utilisateurs
                        </a>
                    </li>

                    <li class="nav-item mb-2">
                        <a class="nav-link" href="#">
                            <i class="bi bi-car-front me-2"></i> Taxis
                        </a>
                    </li>

                    <li class="nav-item mb-2">
                        <a class="nav-link" href="#">
                            <i class="bi bi-graph-up me-2"></i> Statistiques
                        </a>
                    </li>

                    <hr>

                    <li class="nav-item mb-2">
                        <a class="nav-link" href="{% url 'logout' %}">
                            <i class="bi bi-box-arrow-right me-2"></i> Déconnexion
                        </a>
                    </li>

                </ul>

            </div>
        </div>

        <!-- CONTENT -->
        <main class="col-lg-10 ms-sm-auto px-md-4 py-4">
            {% block content %}{% endblock %}
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
