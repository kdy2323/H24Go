{% extends "taxi/base_taxi.html" %}
{% block content %}

<div class="container">

    <div class="row mb-4">
        <div class="col-md-8">
            <h2 class="fw-bold text-center">Mes Courses</h2>
            <div style="font-size:0.78rem; color:rgb(255, 255, 255); margin-top:2px; text-align:center;">
                Suivez vos propositions et courses en cours
            </div>
        </div>
    </div>

    <!-- STATUT REFRESH -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">Propositions envoyées</h4>
        <span class="badge" id="refresh-badge" style="background:rgba(255,255,255,0.1); font-size:0.72rem;">
            <span class="spinner-border spinner-border-sm me-1" role="status" style="width:10px;height:10px;"></span>
            Chargement...
        </span>
    </div>

    <!-- PROPOSITIONS -->
    <div id="propositions-container">
        <div class="text-center py-4" style="color:rgb(255, 255, 255);">
            <div class="spinner-border" role="status"></div>
        </div>
    </div>

    <hr class="my-4" style="border-color:rgb(255, 255, 255);">

    <!-- COURSES CONFIRMÉES -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">Courses confirmées</h4>
        <div class="d-flex align-items-center gap-2">
            <span class="badge bg-success" id="confirmed-count">0</span>
            <button class="btn btn-sm"
                    style="background:rgba(255,255,255,0.08); color:white; border:1px solid rgba(255,255,255,0.1); font-size:0.8rem;"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#coursesConfirmeesContainer"
                    id="toggleBtn">
                <i class="bi bi-eye me-1"></i> Afficher
            </button>
        </div>
    </div>

    <div class="collapse" id="coursesConfirmeesContainer">
        <div id="confirmed-container">
            <div class="text-center py-3" style="color:rgb(255, 255, 255);">
                <div class="spinner-border spinner-border-sm" role="status"></div>
            </div>
        </div>
    </div>

</div>

<script>
function renderPropositions(propositions) {
    const container = document.getElementById('propositions-container');
    const badge = document.getElementById('refresh-badge');

    if (propositions.length === 0) {
        container.innerHTML = `
            <div class="p-3 rounded-3 text-center" style="background:rgba(255,255,255,0.04); color:rgb(255, 255, 255); font-size:0.85rem;">
                Aucune proposition en attente.
            </div>`;
        badge.textContent = '0';
        badge.style.background = 'rgba(255,255,255,0.08)';
        return;
    }

    badge.textContent = propositions.length;
    badge.style.background = 'rgba(232,185,74,0.2)';
    badge.style.color = '#e8b94a';

    let html = '<div class="row">';
    propositions.forEach(p => {
        const isAccepted = p.course_status === 'accepted';
        html += `
        <div class="col-lg-6 mb-3">
            <div class="rounded-4 p-3 h-100" style="background:${isAccepted ? 'rgba(34,197,94,0.08)' : 'rgba(255,255,255,0.04)'}; border:1px solid ${isAccepted ? 'rgba(34,197,94,0.25)' : 'rgba(255,255,255,0.06)'};">

                ${isAccepted ? `<div class="mb-2 px-2 py-1 rounded-2 d-inline-block" style="background:rgba(34,197,94,0.15); color:#4ade80; font-size:0.75rem; font-weight:600;">✔ Client a accepté !</div><br>` : ''}

                <div style="font-size:0.8rem; font-weight:600; color:rgba(255,255,255,0.6); margin-bottom:8px;">
                    👤 ${p.client}
                </div>

                <div style="font-size:0.82rem; color:rgba(255,255,255,0.7); margin-bottom:4px;">
                    <span style="color:rgba(255,255,255,0.4);">Départ</span><br>${p.depart}
                </div>
                <div style="font-size:0.82rem; color:rgba(255,255,255,0.7); margin-bottom:12px;">
                    <span style="color:rgba(255,255,255,0.4);">Arrivée</span><br>${p.arrivee}
                </div>

                <div class="d-flex gap-3">
                    <div class="text-center flex-fill p-2 rounded-3" style="background:rgba(255,255,255,0.04);">
                        <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px;">Prix</div>
                        <div style="font-weight:700; color:#e8b94a;">${p.prix} €</div>
                    </div>
                    <div class="text-center flex-fill p-2 rounded-3" style="background:rgba(255,255,255,0.04);">
                        <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px;">Temps</div>
                        <div style="font-weight:700; color:white;">${p.temps} min</div>
                    </div>
                </div>

                ${!isAccepted ? `
                <div class="mt-3 py-2 text-center rounded-3" style="background:rgba(232,185,74,0.08); color:rgba(232,185,74,0.7); font-size:0.78rem; border:1px solid rgba(232,185,74,0.15);">
                    ⏳ En attente de réponse client
                </div>` : ''}

            </div>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

function renderConfirmed(confirmed) {
    const container = document.getElementById('confirmed-container');
    const countBadge = document.getElementById('confirmed-count');
    countBadge.textContent = confirmed.length;

    if (confirmed.length === 0) {
        container.innerHTML = `
            <div class="p-3 rounded-3 text-center" style="background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.3); font-size:0.85rem;">
                Aucune course confirmée pour le moment.
            </div>`;
        return;
    }

    let html = '<div class="row">';
    confirmed.forEach(c => {
        html += `
        <div class="col-lg-6 mb-3">
            <div class="rounded-4 p-3 h-100" style="background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.2);">

                <div style="font-size:0.8rem; font-weight:600; color:rgba(255,255,255,0.6); margin-bottom:8px;">
                    👤 ${c.client}
                </div>

                <div style="font-size:0.82rem; color:rgba(255,255,255,0.7); margin-bottom:4px;">
                    <span style="color:rgba(255,255,255,0.4);">Départ</span><br>${c.depart}
                </div>
                <div style="font-size:0.82rem; color:rgba(255,255,255,0.7); margin-bottom:12px;">
                    <span style="color:rgba(255,255,255,0.4);">Arrivée</span><br>${c.arrivee}
                </div>

                <div class="d-flex gap-3 mb-3">
                    <div class="text-center flex-fill p-2 rounded-3" style="background:rgba(255,255,255,0.04);">
                        <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px;">Prix</div>
                        <div style="font-weight:700; color:#4ade80;">${c.prix} €</div>
                    </div>
                    <div class="text-center flex-fill p-2 rounded-3" style="background:rgba(255,255,255,0.04);">
                        <div style="font-size:0.65rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px;">Arrivée dans</div>
                        <div style="font-weight:700; color:white;" class="countdown-cell" data-ts="${c.arrivee_ts}">...</div>
                    </div>
                </div>

                <div class="py-2 text-center rounded-3" style="background:rgba(34,197,94,0.12); color:#4ade80; font-size:0.78rem;">
                    ✔ Confirmée & Payée
                </div>

            </div>
        </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
    startCountdowns();
}

function startCountdowns() {
    document.querySelectorAll('.countdown-cell').forEach(el => {
        const ts = parseInt(el.dataset.ts, 10) * 1000;
        if (!ts || isNaN(ts)) { el.textContent = 'Terminée'; return; }

        function tick() {
            const diff = ts - Date.now();
            if (diff <= 0) { el.innerHTML = "<span style='color:#4ade80;'>Arrivé ✔</span>"; return; }
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
            setTimeout(tick, 1000);
        }
        tick();
    });
}

function loadData() {
    fetch("{% url 'ajax_taxi_courses' %}")
        .then(r => r.json())
        .then(data => {
            renderPropositions(data.propositions);
            renderConfirmed(data.confirmed);

            const badge = document.getElementById('refresh-badge');
            const now = new Date().toLocaleTimeString('fr-BE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            if (data.propositions.length === 0) {
                badge.textContent = `🔄 ${now}`;
                badge.style.background = 'rgba(255,255,255,0.08)';
                badge.style.color = 'rgba(255,255,255,0.4)';
            }
        })
        .catch(() => {
            document.getElementById('refresh-badge').textContent = '❌ Erreur';
        });
}

// Toggle bouton texte
const collapseEl = document.getElementById('coursesConfirmeesContainer');
const toggleBtn = document.getElementById('toggleBtn');
collapseEl.addEventListener('show.bs.collapse', () => {
    toggleBtn.innerHTML = '<i class="bi bi-eye-slash me-1"></i> Masquer';
});
collapseEl.addEventListener('hide.bs.collapse', () => {
    toggleBtn.innerHTML = '<i class="bi bi-eye me-1"></i> Afficher';
});

loadData();
setInterval(loadData, 8000);
</script>

{% endblock %}
