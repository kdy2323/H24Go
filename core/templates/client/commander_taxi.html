{% extends 'client/base_client.html' %}

{% block title %}Commander un Taxi{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm border-0">
                <div class="card-body">

                    <h2 class="fw-bold text-center mb-4">Commander un Taxi</h2>
                    <p class="text-muted text-center mb-4">
                        Remplissez les informations ci-dessous pour réserver votre taxi.
                    </p>

                    <form method="POST" id="taxi-form">
                        {% csrf_token %}

                        <!-- DÉPART -->
                        <div class="mb-3">
                            <label class="form-label" for="id_adresse_depart">Adresse de départ</label>
                            <input
                                type="text"
                                class="form-control"
                                name="adresse_depart"
                                id="id_adresse_depart"
                                placeholder="Ex: Avenue des Guerites 867, 7000 Mons"
                                autocomplete="off"
                                required
                            >
                            <div id="suggestions_depart" class="list-group mt-1 shadow-sm"></div>
                            <div id="status_depart" class="form-text mt-1"></div>
                        </div>

                        <!-- ARRIVÉE -->
                        <div class="mb-3">
                            <label class="form-label" for="id_adresse_arrivee">Adresse d'arrivée</label>
                            <input
                                type="text"
                                class="form-control"
                                name="adresse_arrivee"
                                id="id_adresse_arrivee"
                                placeholder="Ex: Rue de Guerre 867, 7012 Jemappes"
                                autocomplete="off"
                                required
                            >
                            <div id="suggestions_arrivee" class="list-group mt-1 shadow-sm"></div>
                            <div id="status_arrivee" class="form-text mt-1"></div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg" id="submit-btn" disabled>
                            Valider la course
                        </button>
                        <p class="text-muted text-center small mt-2">
                            Les deux adresses doivent être validées pour continuer.
                        </p>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<script>
// État de validation des deux champs
const validated = { depart: false, arrivee: false };

function updateSubmitBtn() {
    document.getElementById('submit-btn').disabled = !(validated.depart && validated.arrivee);
}

function setupAddressField(inputId, suggestionsId, statusId, key) {
    const input = document.getElementById(inputId);
    const suggestionsBox = document.getElementById(suggestionsId);
    const statusDiv = document.getElementById(statusId);
    let debounceTimer = null;

    input.addEventListener('input', function () {
        const query = input.value.trim();

        // Reset validation si l'utilisateur retape
        validated[key] = false;
        updateSubmitBtn();
        statusDiv.textContent = '';
        statusDiv.className = 'form-text mt-1';

        if (query.length < 5) {
            suggestionsBox.innerHTML = '';
            return;
        }

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&addressdetails=1&limit=5&countrycodes=be`, {
                headers: { 'Accept-Language': 'fr' }
            })
            .then(r => r.json())
            .then(results => {
                suggestionsBox.innerHTML = '';

                if (results.length === 0) {
                    statusDiv.textContent = '⚠️ Adresse introuvable, vérifiez la saisie.';
                    statusDiv.className = 'form-text mt-1 text-warning';
                    return;
                }

                results.forEach(result => {
                    const item = document.createElement('button');
                    item.type = 'button';
                    item.className = 'list-group-item list-group-item-action small py-2';
                    item.textContent = result.display_name;

                    item.addEventListener('click', () => {
                        input.value = result.display_name;
                        suggestionsBox.innerHTML = '';
                        validated[key] = true;
                        statusDiv.textContent = '✅ Adresse validée';
                        statusDiv.className = 'form-text mt-1 text-success';
                        updateSubmitBtn();
                    });

                    suggestionsBox.appendChild(item);
                });
            })
            .catch(() => {
                statusDiv.textContent = '❌ Erreur de vérification, réessayez.';
                statusDiv.className = 'form-text mt-1 text-danger';
            });
        }, 500); // délai 500ms après la dernière frappe
    });

    // Fermer les suggestions si clic ailleurs
    document.addEventListener('click', (e) => {
        if (!input.contains(e.target) && !suggestionsBox.contains(e.target)) {
            suggestionsBox.innerHTML = '';
        }
    });
}

setupAddressField('id_adresse_depart', 'suggestions_depart', 'status_depart', 'depart');
setupAddressField('id_adresse_arrivee', 'suggestions_arrivee', 'status_arrivee', 'arrivee');
</script>

{% endblock %}
