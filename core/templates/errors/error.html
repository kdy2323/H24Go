{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oups — H24Go</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="{% static 'img/favi.ico' %}" type="image/x-icon">
</head>

<body style="background:#111; color:white; font-family:'Barlow',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center;">

    <!-- Halo décoratif -->
    <div style="position:fixed; top:-100px; right:-100px; width:300px; height:300px;
                background:radial-gradient(circle, rgba(232,185,74,0.08) 0%, transparent 70%);
                border-radius:50%; pointer-events:none;"></div>

    <!-- Brand -->
    <div style="font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:2rem; letter-spacing:2px; margin-bottom:32px;">
        H<span style="color:#e8b94a;">24</span>GO
    </div>

    <!-- Icône -->
    <div style="font-size:4rem; margin-bottom:16px;">⚠️</div>

    <!-- Titre -->
    <h1 style="font-family:'Barlow Condensed',sans-serif; font-size:1.8rem; font-weight:900; margin-bottom:8px;">
        Une erreur s'est produite
    </h1>

    <!-- Message -->
    <p style="color:rgba(255,255,255,0.5); font-size:0.95rem; max-width:320px; line-height:1.6; margin-bottom:32px;">
        {% block error_message %}
        Fermez l'application et relancez-la.<br>
        Si le problème persiste, contactez notre support.
        {% endblock %}
    </p>

    <!-- Boutons -->
    <div style="display:flex; flex-direction:column; gap:12px; width:100%; max-width:300px;">

        <a href="/" style="display:block; padding:14px; border-radius:12px;
                           background:linear-gradient(135deg,#e8b94a,#c49a2e);
                           color:#111; font-weight:700; text-decoration:none;
                           font-family:'Barlow Condensed',sans-serif; font-size:1rem;
                           letter-spacing:1px; text-transform:uppercase;">
            🏠 Retour à l'accueil
        </a>

        <button onclick="window.location.reload()"
                style="padding:14px; border-radius:12px; cursor:pointer;
                       background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.6);
                       border:1px solid rgba(255,255,255,0.1); font-size:0.9rem;
                       font-family:'Barlow',sans-serif;">
            🔄 Réessayer
        </button>

    </div>

    <!-- Contact -->
    <p style="margin-top:40px; color:rgba(255,255,255,0.2); font-size:0.75rem;">
        Besoin d'aide ? <a href="tel:+32467703246" style="color:#e8b94a; text-decoration:none;">+32 467 70 32 46</a>
    </p>

</body>
</html>
